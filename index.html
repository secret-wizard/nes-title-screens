<!-- ==================== MARKUP FULL ==================== -->
<!-- POSTER -->
<style>
  .image {
    height: 480px;
    width: auto;
    max-width: 100%;
    object-fit: cover;
    object-position: center;
  }
</style>
<img class="image image-dither" alt="NES Title Screen" src="{{ images.all }}">

<!-- ==================== MARKUP HALF HORIZONTAL ==================== -->
<!-- POSTER -->

  .image {
    height: 100%;
    width: 100%;
    max-width: 100%;
    object-fit: cover;
    object-position: center;
  }
</style>
<img class="image image-dither" alt="NES Title Screen" src="{{ images.all }}">

<!-- ==================== MARKUP HALF VERTICAL ==================== -->
<!-- POSTER -->

    background: #000;

    width: 100%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    object-position: center;
  }
</style>
<img class="image image-dither" alt="NES Title Screen" src="{{ images.all }}">
