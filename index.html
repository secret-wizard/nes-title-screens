<!-- NES TITLE SCREEN -->
<style>
  .nes-wrapper {
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
    background:#000;
  }
  .image {
    height:100%;
    width:auto;
    max-width:100%;
    object-fit:contain;
    object-position:center;
  }
</style>

<div class="nes-wrapper">
  <img id="poster" class="image image-dither" alt="NES Title Screen">
</div>

<!-- LOGIC -->
<script>
  document.addEventListener('DOMContentLoaded', () => {

    /* Full-bleed black background, centered image */
    const screen = document.querySelector('.screen');
    if (screen) {
      screen.style.background = '#000';
      screen.style.padding = '0';
      screen.style.margin = '0';
    }

    /* Fetch images.json → pick random → display */
    const jsonUrl = 'https://raw.githubusercontent.com/secret-wizard/nes-title-screens/main/images.json';

    function shuffle(a){
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    fetch(jsonUrl)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => {
        if (!d.images?.length) throw 'empty list';
        document.getElementById('poster').src = shuffle(d.images)[0];
        console.log('[TRMNL-NES-Screens] title screen set');
      })
      .catch(e => console.error('[TRMNL-NES-Screens] fetch error:', e));
  });
</script>
